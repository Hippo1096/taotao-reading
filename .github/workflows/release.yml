name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, blank = auto"
        required: false
        type: string
      release_notes:
        description: "Release notes, use \\n for Markdown newlines"
        required: false
        type: string

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Resolve release tag
        id: meta
        run: |
          VERSION_NAME="$(sed -n 's/^def version = \"\(.*\)\"/\1/p' app/build.gradle | head -1)"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0"; fi
          TAG_DEFAULT="v${VERSION_NAME}-$(date +%Y%m%d%H%M)"
          TAG="${{ inputs.release_tag }}"
          if [ -z "$TAG" ]; then TAG="$TAG_DEFAULT"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Configure release signing
        env:
          KSTORE_P1: ${{ secrets.RELEASE_KEYSTORE_PART1 }}
          KSTORE_P2: ${{ secrets.RELEASE_KEYSTORE_PART2 }}
        run: |
          set -euo pipefail
          mkdir -p app/signing
          if [ -n "$KSTORE_P1" ] && [ -n "$KSTORE_P2" ]; then
            echo "${KSTORE_P1}${KSTORE_P2}" | base64 -d > app/signing/release.p12
            echo "Release signing configured from GitHub Secrets (split-secret PKCS12, $(wc -c < app/signing/release.p12) bytes)"
          else
            echo "No signing secrets found in GitHub Secrets, generating temporary release keystore using keytool..."
            keytool -genkeypair -v -keystore app/signing/release.p12 -storetype PKCS12 -keyalg RSA -keysize 2048 -validity 10000 -alias taotao -storepass taotao123 -keypass taotao123 -dname "CN=TaoTao, OU=Reading, O=Legado, L=Beijing, S=Beijing, C=CN"
            echo "Temporary release keystore generated successfully!"
          fi
          {
            echo ""
            echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/app/signing/release.p12"
            echo "RELEASE_KEY_ALIAS=taotao"
            echo "RELEASE_STORE_PASSWORD=taotao123"
            echo "RELEASE_KEY_PASSWORD=taotao123"
          } >> gradle.properties

      - name: Build app release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleAppRelease --no-daemon

      - name: Collect artifacts
        run: |
          rm -rf dist
          mkdir -p dist
          find app/build/outputs/apk -name "*.apk" -exec cp {} dist/ \;
          ls -lh dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="${{ inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="自动触发 GitHub Actions 构建发布。"
          fi
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "桃子阅读 ${{ steps.meta.outputs.tag }}" \
            --notes "$NOTES" \
            dist/*.apk || echo "Release creation skipped or failed, check permissions"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: taotao-${{ steps.meta.outputs.tag }}
          path: dist/*
