name: Isolate TZ
on:
  workflow_dispatch:
    inputs:
      test:
        description: "test"
        required: false
        type: string
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: date; echo "TZ test"
