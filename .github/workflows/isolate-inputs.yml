name: Isolate inputs
on:
  workflow_dispatch:
    inputs:
      test:
        description: "test input"
        required: false
        type: string
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - run: echo "inputs work"
