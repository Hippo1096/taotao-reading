name: Isolate split secret
on: workflow_dispatch
permissions: {contents: write}
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          KEYSTORE="${{ secrets.RELEASE_KEYSTORE_PART1 }}${{ secrets.RELEASE_KEYSTORE_PART2 }}"
          echo "$KEYSTORE" | base64 -d > /tmp/test.p12
          echo "Size: $(wc -c < /tmp/test.p12) bytes"
