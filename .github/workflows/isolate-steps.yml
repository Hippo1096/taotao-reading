name: Isolate full steps
on:
  workflow_dispatch:
    inputs:
      test:
        description: "test"
        required: false
        type: string
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: Resolve tag
        id: meta
        run: |
          echo "tag=v1.0-$(date +%Y%m%d%H%M)" >> $GITHUB_OUTPUT
      - name: Signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p app/signing
          echo "$KEYSTORE_B64" | base64 -d > app/signing/release.p12
          echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/app/signing/release.p12" > local.properties
          echo "RELEASE_KEY_ALIAS=taotao" >> local.properties
          echo "RELEASE_STORE_PASSWORD=taotao123" >> local.properties
          echo "RELEASE_KEY_PASSWORD=taotao123" >> local.properties
      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleAppRelease --no-daemon
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: taotao-${{ steps.meta.outputs.tag }}
          path: app/build/outputs/apk/**/*.apk
