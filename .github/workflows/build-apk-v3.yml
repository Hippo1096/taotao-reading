name: Build APK v3
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, blank = auto"
        required: false
        type: string
      release_notes:
        description: "Release notes"
        required: false
        type: string
permissions:
  contents: write
env:
  TZ: Asia/Shanghai
jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
      - name: Resolve release tag
        id: meta
        run: |
          VERSION_NAME="$(sed -n 's/^def version = \"\(.*\)\"/\1/p' app/build.gradle | head -1)"
          if [ -z "$VERSION_NAME" ]; then VERSION_NAME="1.0"; fi
          TAG="v${VERSION_NAME}-$(date +%Y%m%d%H%M)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - name: Configure release signing
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p app/signing
          echo "$KEYSTORE_B64" | base64 -d > app/signing/release.p12
          echo "RELEASE_STORE_FILE=$GITHUB_WORKSPACE/app/signing/release.p12" > local.properties
          echo "RELEASE_KEY_ALIAS=taotao" >> local.properties
          echo "RELEASE_STORE_PASSWORD=taotao123" >> local.properties
          echo "RELEASE_KEY_PASSWORD=taotao123" >> local.properties
      - name: Build app release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleAppRelease --no-daemon
      - name: Collect and upload
        uses: actions/upload-artifact@v4
        with:
          name: taotao-${{ steps.meta.outputs.tag }}
          path: app/build/outputs/apk/**/*.apk
